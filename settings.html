<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.cube - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="tictactoe.css">
    <style>
        /* Standalone Settings Layout */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-y: auto !important;
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="card settings-card" style="width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 20px;">
        <div class="logo-container" style="display: flex; justify-content: center; margin-bottom: 0.5rem;">
            <img src="logo.png" alt="T.cube Logo" style="width: 120px; height: auto;">
        </div>
        <h1 class="title">Settings</h1>
        <p class="subtitle">Manage Account Details</p>

        <div class="settings-content">
            <form id="form-settings" onsubmit="handleUpdateSettings(event)">
                <div class="form-group">
                    <label>Email (Read Only)</label>
                    <input type="email" id="settings-email" disabled>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="settings-username" required minlength="3" maxlength="20">
                </div>
                <div id="settings-status" class="auth-success" style="color: var(--wood-light)"></div>
                <button type="submit" class="btn btn-primary btn-full">
                    <span class="btn-text" style="align-items: center"><strong>Save Changes</strong></span>
                </button>
            </form>

            <div style="height: 16px;"></div>
            <hr style="border: none; border-top: 1px solid var(--wood-border); margin: 15px 0;">

            <div class="settings-row" style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: var(--text); font-weight: 500;">Appearance</span>
                <button id="settings-theme-toggle" class="btn btn-ghost" onclick="toggleTheme()"
                    style="padding: 6px 12px;" type="button">Toggle Theme</button>
            </div>
        </div>

        <button class="btn btn-secondary btn-full" onclick="window.location.href='tictactoe.html'"
            style="margin-top: 1.5rem;">
            <span class="btn-text" style="justify-content: center; width: 100%;"><strong>Back to Menu</strong></span>
        </button>
    </div>

    <!-- Minimal JS to handle the Settings logic without the full game logic -->
    <script>
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            localStorage.setItem('ttt_theme', body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('ttt_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
        }
        initTheme();

        const currentUser = localStorage.getItem('ttt_currentUser');
        let dbUsers = [];

        async function fetchUsers() {
            try {
                const res = await fetch('/api/db');
                const data = await res.json();
                if (data.users) dbUsers = data.users;
            } catch (e) {
                console.error('Failed to load users', e);
            }
        }

        window.onload = async function () {
            if (!currentUser) {
                window.location.href = 'tictactoe.html';
                return;
            }

            await fetchUsers();
            const user = dbUsers.find(u => u.email === currentUser);

            if (user) {
                document.getElementById('settings-email').value = user.email;
                document.getElementById('settings-username').value = user.username || '';
            }
        };

        async function handleUpdateSettings(e) {
            e.preventDefault();
            const newUsername = document.getElementById('settings-username').value.trim();
            const statusEl = document.getElementById('settings-status');

            const user = dbUsers.find(u => u.email === currentUser);
            if (!user) return;

            const taken = dbUsers.find(u => u.username === newUsername && u.email !== currentUser);
            if (taken) {
                statusEl.style.color = '#ff6b6b';
                statusEl.textContent = 'Username is already taken.';
                return;
            }

            user.username = newUsername;

            try {
                await fetch('/api/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'users', action: 'update', data: user })
                });
                statusEl.style.color = 'var(--wood-light)';
                statusEl.textContent = 'Settings saved successfully!';
            } catch (e) {
                statusEl.style.color = '#ff6b6b';
                statusEl.textContent = 'Failed to save. Try again.';
            }

            setTimeout(() => {
                statusEl.textContent = '';
            }, 3000);
        }
    </script>
</body>

</html>
