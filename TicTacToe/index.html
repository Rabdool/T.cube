<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Crypt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #e6edf3;
            --accent-color: #58a6ff;
            --secondary-color: #8b949e;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --success-color: #238636;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #d2a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            background-color: var(--bg-color);
            padding: 5px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            color: var(--secondary-color);
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .tab.active {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 10px rgba(88, 166, 255, 0.3);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
            font-size: 0.9rem;
        }

        textarea,
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .result-area {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: rgba(88, 166, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            position: relative;
        }

        .result-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background-color: var(--card-bg);
            padding: 0 10px;
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: 600;
        }

        #output {
            word-break: break-all;
            min-height: 60px;
            font-size: 1.2rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--text-color);
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Emoji Crypt</h1>

        <div class="tabs">
            <div class="tab active" data-mode="encrypt">Encrypt</div>
            <div class="tab" data-mode="decrypt">Decrypt</div>
        </div>


        <!-- Encrypt Section -->
        <div id="encrypt-section">
            <div class="input-group">
                <label for="encrypt-shift">Shift Key (Number)</label>
                <input type="number" id="encrypt-shift" value="3" placeholder="Enter shift key">
            </div>

            <div class="input-group">
                <label for="encrypt-input">Enter Text to Encrypt</label>
                <textarea id="encrypt-input" rows="4" placeholder="Type your message here..."></textarea>
            </div>

            <div class="result-area">
                <span class="result-label">RESULT</span>
                <button class="copy-btn" title="Copy to clipboard" onclick="copyToClipboard('encrypt-output', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <div id="encrypt-output" class="output-text"></div>
            </div>
        </div>

        <!-- Decrypt Section -->
        <div id="decrypt-section" style="display: none;">
            <div class="input-group">
                <label for="decrypt-shift">Shift Key (Number)</label>
                <input type="number" id="decrypt-shift" value="3" placeholder="Enter shift key">
            </div>

            <div class="input-group">
                <label for="decrypt-input">Enter Emoji Crypted Text</label>
                <textarea id="decrypt-input" rows="4" placeholder="Paste emojis here..."></textarea>
            </div>

            <div class="result-area">
                <span class="result-label">RESULT</span>
                <button class="copy-btn" title="Copy to clipboard" onclick="copyToClipboard('decrypt-output', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2-2v1"></path>
                    </svg>
                </button>
                <div id="decrypt-output" class="output-text"></div>
            </div>
        </div>
    </div>

    <script>
        const ALPHABET = 'abcdefghijklmnopqrstuvwxyz'.split('');
        const EMOJIS = ['😀', '😁', '😂', '🤣', '😃', '😄', '😅', '😆', '😉', '😊', '😍', '🤩', '😎', '🥳', '😏', '😌', '🤔', '😴', '😜', '🤯', '🔥', '🚀', '💡', '🎯', '💚', '💼'];

        const tabs = document.querySelectorAll('.tab');

        const encryptSection = document.getElementById('encrypt-section');
        const decryptSection = document.getElementById('decrypt-section');

        const encryptInput = document.getElementById('encrypt-input');
        const decryptInput = document.getElementById('decrypt-input');

        // Revised selectors for shift
        const encryptShift = document.getElementById('encrypt-shift');
        const decryptShift = document.getElementById('decrypt-shift');

        const encryptOutput = document.getElementById('encrypt-output');
        const decryptOutput = document.getElementById('decrypt-output');

        let currentMode = 'encrypt';

        // Event Listeners
        encryptShift.addEventListener('input', () => process('encrypt'));
        decryptShift.addEventListener('input', () => process('decrypt'));
        encryptInput.addEventListener('input', () => process('encrypt'));
        decryptInput.addEventListener('input', () => process('decrypt'));

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.dataset.mode;

                if (currentMode === 'encrypt') {
                    encryptSection.style.display = 'block';
                    decryptSection.style.display = 'none';
                } else {
                    encryptSection.style.display = 'none';
                    decryptSection.style.display = 'block';
                }
            });
        });

        function process(mode) {
            if (mode === 'encrypt') {
                const text = encryptInput.value;
                const shift = parseInt(encryptShift.value) || 0;
                encryptOutput.textContent = encrypt(text, shift);
            } else {
                const text = decryptInput.value;
                const shift = parseInt(decryptShift.value) || 0;
                decryptOutput.textContent = decrypt(text, shift);
            }
        }

        function encrypt(text, shift) {
            let result = '';
            const lowerText = text.toLowerCase();

            for (let i = 0; i < lowerText.length; i++) {
                const char = lowerText[i];
                const index = ALPHABET.indexOf(char);

                if (index !== -1) {
                    let newIndex = (index + shift) % 26;
                    if (newIndex < 0) newIndex += 26;
                    result += EMOJIS[newIndex];
                } else {
                    result += text[i];
                }
            }
            return result;
        }

        function decrypt(text, shift) {
            let result = '';
            const chars = [...text];

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                const index = EMOJIS.indexOf(char);

                if (index !== -1) {
                    let newIndex = (index - shift) % 26;
                    if (newIndex < 0) newIndex += 26;
                    result += ALPHABET[newIndex];
                } else {
                    result += char;
                }
            }
            return result;
        }

        async function copyToClipboard(elementId, btnElement) {
            try {
                const text = document.getElementById(elementId).textContent;
                await navigator.clipboard.writeText(text);
                const originalHTML = btnElement.innerHTML;
                btnElement.innerHTML = '<span style="font-size: 12px; color: #238636;">Copied!</span>';
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }
    </script>
</body>

</html>
